<article class="item-card">
  <h3><a href="/items/{{ item.slug }}.html">{{ item.name }}</a></h3>
  <div class="meta">
    <span class="seen-count">SEEN: {{ item.times_seen }}X</span>
    <span class="last-seen">LAST: {{ item.last_seen_at[:10] }}</span>
  </div>
  <p class="summary">{{ item.summary | truncate(100) }}</p>
  <div class="tags">
    <span class="tag">ID: {{ item.id[:8] }}</span>
    {% if item.thing_url %}
    <a href="{{ item.thing_url }}" class="tag" target="_blank" rel="noopener">EXTERNAL_LINK_</a>
    {% endif %}
  </div>
</article>
