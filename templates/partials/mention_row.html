<div class="mention-row">
  <div class="date">{{ mention.seen_at[:10] }}</div>
  <div class="details">
    <h4>
      {% if mention.source_story_title %}
        {{ mention.source_story_title }}
      {% else %}
        MENTION_DETECTED
      {% endif %}
    </h4>
    <div class="source">
      Source: <a href="{{ mention.hn_url }}" target="_blank" rel="noopener">HN:{{ mention.source_story_id }}</a>
      {% if mention.is_repeat %} <span class="badge">REPEAT</span>{% endif %}
    </div>
  </div>
  <div class="action">
    <a href="{{ mention.hn_url }}" class="btn" target="_blank" rel="noopener">SOURCE_</a>
  </div>
</div>
